on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v5
        with:
          dependency-graph: generate-and-submit
